  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  flame: ^1.28.0
  flame_audio: ^2.11.4
  flame_bloc: ^1.12.11
  flutter_bloc: ^9.1.1
  go_router: ^15.2.4
  grpc: ^4.1.0
